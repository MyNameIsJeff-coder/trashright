    <!-- PWA: Service worker + auto-sync listener -->
    <script>
    (function () {
        if (!('serviceWorker' in navigator)) return;

        /* Register service worker */
        navigator.serviceWorker.register('/sw.js')
            .then(reg => {
                /* Check for SW updates every time page loads */
                reg.update();

                /* New SW waiting — will activate on next navigation */
                reg.addEventListener('updatefound', () => {
                    const newWorker = reg.installing;
                    if (!newWorker) return;
                    newWorker.addEventListener('statechange', () => {
                        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            /* New version ready — activate silently */
                            newWorker.postMessage({ type: 'SKIP_WAITING' });
                        }
                    });
                });
            })
            .catch(() => {});

        /* Listen for ITEMS_UPDATED message from SW background sync.
           When admin adds/removes items, SW tells every open page.
           We reload the ALL_ITEMS array in index.html if present. */
        navigator.serviceWorker.addEventListener('message', function (event) {
            if (event.data && event.data.type === 'ITEMS_UPDATED') {
                /* If we're on the home page, refresh the autocomplete list */
                if (window.location.pathname === '/' && typeof reloadAutoCompleteItems === 'function') {
                    reloadAutoCompleteItems();
                }
                /* Show a subtle toast notification */
                showSyncToast();
            }
        });

        /* Reload page when new SW takes control */
        navigator.serviceWorker.addEventListener('controllerchange', function () {
            window.location.reload();
        });

        /* ── Sync toast notification ── */
        function showSyncToast() {
            const existing = document.getElementById('syncToast');
            if (existing) existing.remove();

            const toast = document.createElement('div');
            toast.id = 'syncToast';
            toast.innerHTML = '<span>🔄</span><span>New items synced</span>';
            toast.style.cssText = `
                position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
                background: rgba(1,12,6,0.95); border: 1px solid rgba(34,197,94,0.4);
                color: #86efac; font-family: 'Plus Jakarta Sans', sans-serif;
                font-size: 13px; font-weight: 600; padding: 10px 18px;
                border-radius: 999px; display: flex; align-items: center; gap: 8px;
                box-shadow: 0 8px 28px rgba(0,0,0,0.4); z-index: 9999;
                animation: toastIn 0.3s cubic-bezier(0.22,1,0.36,1) both;
            `;
            document.head.insertAdjacentHTML('beforeend',
                '<style>@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}</style>'
            );
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.transition = 'opacity 0.3s';
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    })();
    </script>

    <!-- Firefly particle engine -->
    <script>
    (function(){
        const cv = document.getElementById('bg-canvas');
        const cx = cv.getContext('2d');
        function resize(){
            cv.width  = window.innerWidth;
            cv.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);
        const FF = Array.from({length: 45}, () => ({
            x:  Math.random() * window.innerWidth,
            y:  Math.random() * window.innerHeight,
            r:  Math.random() * 1.6 + 0.3,
            vx: (Math.random() - 0.5) * 0.2,
            vy: (Math.random() - 0.5) * 0.15,
            a:  Math.random(),
            ad: Math.random() > 0.5 ? 1 : -1,
            as: Math.random() * 0.006 + 0.003,
            h:  Math.random() > 0.65 ? 160 : 142
        }));
        function tick(){
            cx.clearRect(0, 0, cv.width, cv.height);
            FF.forEach(f => {
                f.x += f.vx; f.y += f.vy;
                f.a += f.ad * f.as;
                if(f.a >= 1){ f.a = 1; f.ad = -1; }
                if(f.a <= 0){ f.a = 0; f.ad =  1; }
                if(f.x < 0) f.x = cv.width;  if(f.x > cv.width)  f.x = 0;
                if(f.y < 0) f.y = cv.height; if(f.y > cv.height) f.y = 0;
                const g = cx.createRadialGradient(f.x, f.y, 0, f.x, f.y, f.r * 7);
                g.addColorStop(0, `hsla(${f.h},88%,72%,${f.a * 0.85})`);
                g.addColorStop(1, `hsla(${f.h},88%,60%,0)`);
                cx.beginPath(); cx.arc(f.x, f.y, f.r * 7, 0, Math.PI*2);
                cx.fillStyle = g; cx.fill();
            });
            requestAnimationFrame(tick);
        }
        tick();
    })();
    </script>


    <!-- Page transition engine (single, clean, handles swipe-back) -->
    <script>
    (function () {

        /* ── Page depth: determines forward vs back direction ── */
        function depth(path) {
            if (!path || path === '/')           return 0;  // Home
            if (path.startsWith('/category'))    return 1;  // Category
            if (path.startsWith('/results'))     return 2;  // Results
            return 0;
        }

        const card         = document.querySelector('.app-card');
        const currentDepth = depth(window.location.pathname);

        /* ── Tag every history entry with its depth ── */
        /* This lets popstate (swipe-back/forward) know which direction to animate */
        const stateDepth = (history.state && history.state.depth != null)
            ? history.state.depth
            : currentDepth;
        history.replaceState({ depth: stateDepth }, '');

        /* ── Entrance animation on page load ── */
        if (card) {
            const dir = sessionStorage.getItem('tr-nav-dir');
            sessionStorage.removeItem('tr-nav-dir');
            const cls = dir === 'fwd'  ? 'entering-fwd'
                      : dir === 'back' ? 'entering-back'
                      : null;
            if (cls) {
                card.classList.add(cls);
                card.addEventListener('animationend', () => {
                    card.classList.remove('entering-fwd', 'entering-back');
                }, { once: true });
            } else {
                /* First ever load — gentle fade-in from right */
                card.classList.add('entering-fwd');
                card.addEventListener('animationend', () => {
                    card.classList.remove('entering-fwd');
                }, { once: true });
            }
        }

        /* ── Core: exit animation then navigate ── */
        function go(href, isForward) {
            if (!card) { window.location.href = href; return; }
            sessionStorage.setItem('tr-nav-dir', isForward ? 'fwd' : 'back');
            card.classList.add(isForward ? 'exiting-fwd' : 'exiting-back');
            card.addEventListener('animationend', () => {
                window.location.href = href;
            }, { once: true });
        }

        /* ── Intercept <a> clicks ── */
        document.addEventListener('click', function (e) {
            const a = e.target.closest('a[href]');
            if (!a) return;
            const href = a.getAttribute('href');
            if (!href || href.startsWith('http') || href.startsWith('//') ||
                href.startsWith('#') || href.startsWith('mailto') ||
                href.startsWith('data') || a.hasAttribute('download')) return;
            e.preventDefault();
            const isForward = depth(href) > currentDepth;
            go(href, isForward);
        });

        /* ── Intercept form submit (search bar) ── */
        document.addEventListener('submit', function (e) {
            const form = e.target;
            if (!form || (form.method || '').toLowerCase() !== 'post') return;
            const input = form.querySelector('input[name="query"]');
            if (!input || !input.value.trim()) return;
            e.preventDefault();
            e.stopImmediatePropagation();
            go('/results?q=' + encodeURIComponent(input.value.trim()), true);
        });

        /* ── Handle browser swipe-back / swipe-forward (popstate) ── */
        window.addEventListener('popstate', function (e) {
            /* The new state has the depth of the page we're going TO */
            const toDepth   = (e.state && e.state.depth != null) ? e.state.depth : 0;
            const isForward = toDepth > currentDepth;
            if (!card) return;
            /* Play exit animation, then let the browser finish the navigation */
            card.classList.add(isForward ? 'exiting-fwd' : 'exiting-back');
            /* Browser already navigated — just animate out, page will reload */
        });

    })();
    </script>


    <!-- PWA: Service Worker registration -->
    <script>
    (function () {
        if (!('serviceWorker' in navigator)) return;

        window.addEventListener('load', function () {
            navigator.serviceWorker.register('/sw.js')
                .then(function (reg) {
                    /* Check for updates every 60 seconds while app is open */
                    setInterval(() => reg.update(), 60000);

                    /* When a new service worker is waiting, activate it */
                    reg.addEventListener('updatefound', function () {
                        const newWorker = reg.installing;
                        newWorker.addEventListener('statechange', function () {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                /* New version available — silently activate */
                                newWorker.postMessage({ type: 'SKIP_WAITING' });
                            }
                        });
                    });
                })
                .catch(function (err) {
                    console.warn('Service worker registration failed:', err);
                });

            /* Reload page when new service worker takes control */
            navigator.serviceWorker.addEventListener('controllerchange', function () {
                window.location.reload();
            });
        });

        /* ── Offline / Online indicator ── */
        function updateOnlineStatus() {
            const indicator = document.getElementById('online-indicator');
            if (!indicator) return;
            if (navigator.onLine) {
                indicator.style.display = 'none';
            } else {
                indicator.style.display = 'flex';
            }
        }
        window.addEventListener('online',  updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);
        window.addEventListener('load',    updateOnlineStatus);
    })();
    </script>

    <div id="online-indicator" style="display:none;
         position:fixed;bottom:16px;left:50%;transform:translateX(-50%);

    </div>
